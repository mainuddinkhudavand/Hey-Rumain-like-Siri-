<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rumain — Cosmic Voice Portal</title>
  <meta name="description" content="Rumain: Premium Siri-like 3D voice console."/>
  <link rel="stylesheet" href="/static/style.css"/>
  <!-- Load Three.js for liquid aurora stardust background -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
  <script src="/static/app.js" defer></script>
</head>
<body>

  <!-- Fullscreen 3D Fluid Aurora & Starfield Canvas -->
  <canvas id="bg-canvas"></canvas>

  <div id="app" class="deck-container">

    <!-- Top floating header -->
    <div class="system-status-header">
      <div class="status-pill" id="ws-status">
        <span class="pulse-dot"></span>
        <span id="ws-status-text">Connecting Uplink</span>
      </div>
    </div>

    <!-- Main split layout -->
    <div class="fluid-deck">
      
      <!-- LEFT: The Glassmorphic Voice Portal (Avatar) -->
      <div class="glass-portal" id="portal-frame">
        <div class="portal-sphere">
          <!-- Inner stardust canvas for localized vortex behind avatar -->
          <canvas id="orb-galaxy-canvas"></canvas>
          <div class="avatar-capsule" id="orb-core">
            <img src="/static/avatar.png" alt="Assistant Avatar" id="avatar-img" />
          </div>
        </div>
        <div class="portal-status">
          <p class="status-subtitle">System Status</p>
          <h2 class="status-title" id="orb-state">Standby</h2>
        </div>
        
        <!-- Elegant Voice Waveform -->
        <div class="waveform" id="waveform">
          <div class="wave-bar" style="height:6px"></div>
          <div class="wave-bar" style="height:14px"></div>
          <div class="wave-bar" style="height:8px"></div>
          <div class="wave-bar" style="height:22px"></div>
          <div class="wave-bar" style="height:10px"></div>
          <div class="wave-bar" style="height:30px"></div>
          <div class="wave-bar" style="height:18px"></div>
          <div class="wave-bar" style="height:12px"></div>
          <div class="wave-bar" style="height:26px"></div>
          <div class="wave-bar" style="height:8px"></div>
          <div class="wave-bar" style="height:20px"></div>
          <div class="wave-bar" style="height:14px"></div>
          <div class="wave-bar" style="height:6px"></div>
        </div>
      </div>

      <!-- RIGHT: The Chat Console (Log & Text fallback) -->
      <div class="glass-console" id="console-frame">
        <div class="console-header">
          <span class="console-title">UPLINK_FEED</span>
          <button onclick="clearLog()" class="clear-btn">Purge Logs</button>
        </div>
        
        <div class="log-feed" id="log-feed">
          <div class="log-entry info">
            <span class="log-time" id="start-time"></span>
            Awaiting system trigger...
          </div>
        </div>
        
        <div class="console-input-bar">
          <button id="ptt-btn" class="voice-mic-btn" onclick="toggleWebSpeech()" title="Speak Command">
            <span class="mic-glyph">🌀</span>
          </button>
          <input type="text" class="console-input" id="cmd-input"
                 placeholder="Send a text command..."
                 autocomplete="off"
                 onkeydown="if(event.key==='Enter')sendCommand()"/>
          <button class="send-action-btn" onclick="sendCommand()" title="Send">➤</button>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
